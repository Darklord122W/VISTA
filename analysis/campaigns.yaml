  # -------------------------------------------------------------------------
  # TABLE IV — skewed-activity microbenchmark (tab:skew)
  # -------------------------------------------------------------------------
  # METRIC: event_recall (ONSET / frame time), NOT tta_recall. The caption
  # says "recall within Delta of onset". This differs from Tables II and III,
  # which use tta_recall (emission time). Both live in the same JSONs under
  # different keys, so the mistake is one dictionary key wide. On the brief
  # set the gap is material: event_recall@250 median .723 vs tta_recall@250
  # median .682. The abstract's headline 0.30 -> 0.71 is the ONSET metric.
  #
  # Paper cells (hot-cam share % | brief @250 | brief @1s | pers @250 | pers @1s):
  #   VISTA-Fresh, stash 1     25    | 25 | 54 | 47 | 78
  #   VISTA-Fresh, stash 2     25    | 30 | 57 | 35 | 67
  #   VISTA-Activity, stash 1  26-29 | 39 | 68 | 48 | 77
  #   VISTA-Activity, stash 2  48    | 71 | 80 | 77 | 86
  #
  # RECOMPUTE REQUIRED (VERIFIED): the stash-2 rows have NO committed scoring
  # output. No analysis JSON anywhere references briefS2 / persS2 / briefD2ctl;
  # those run dirs are dated 2026-07-10 14:39, which POSTDATES the newest
  # analysis JSON in the archive (recall_brief.json, 2026-07-09 23:36). The raw
  # dets survive, so the rows are recomputable — that is what make_table4.py
  # does — but nothing in the archive independently corroborates them.
  # -------------------------------------------------------------------------
  table4:
    caption: "Skewed-activity microbenchmark: recall within Delta of onset"
    generator: make_table4.py
    metric: event_recall          # <-- ONSET time. Stated explicitly, on purpose.
    deltas_ms: [250, 1000]
    n_repeats: 3
    notes: >-
      The clip sets are composited extreme-skew isolation clips (cam0 busy,
      cam1/2 empty, cam3 one rare ~10 s event), not real footage; the paper
      labels them as such. Each set is scored against its OWN reference
      detector run, so brief and persistent recalls are not comparable to
      Tables II/III or to each other in absolute terms.
      STASH-1 ROW SOURCE (VERIFIED, and contrary to the obvious guess): the
      brief stash-1 rows are briefD2ctl_*, NOT brief_*. The paper's caption
      says the grid is "{activity on/off} x {stash 1,2} at d=2", and
      run_meta.json shows brief_*'s cmd carries --sched-depth 1 while
      briefD2ctl_*'s carries no depth flag (i.e. the d=2 default) and no
      --sched-stash (i.e. the stash=1 default). briefD2ctl is therefore the
      d=2 control added so the stash comparison is apples-to-apples, and
      "D2ctl" reads as "depth-2 control".
      Corroboration: the paper's practitioner note says d=1 costs "roughly
      half the output age"; brief_* (d=1) logs 60 ms mean age vs
      briefD2ctl_* (d=2) at 118 ms. That is the d=1 note's evidence, and it
      confirms brief_* is the d=1 arm.
      The persistent stash-1 rows are impcmp_*, whose cmd also carries no
      depth/stash flag (d=2, stash=1) — consistent. The caption's "persistent-
      set stash-1 rows are from the prior campaign" refers to these.
    rows:
      - paper_name: "VISTA-Fresh, stash 1"
        internal_arm: fresh-k2
        stash: 1
        depth: 2
        clip_set: brief
        oracle: brief_x
        metric: event_recall
        n_repeats: 3
        run_dirs:
          - briefD2ctl_fresh-k2/fresh-k2_r0
          - briefD2ctl_fresh-k2/fresh-k2_r1
          - briefD2ctl_fresh-k2/fresh-k2_r2
        notes: "No scoring JSON. Recomputed by make_table4.py from raw dets."
      - paper_name: "VISTA-Fresh, stash 2"
        internal_arm: fresh-k2
        stash: 2
        depth: 2
        clip_set: brief
        oracle: brief_x
        metric: event_recall
        n_repeats: 3
        run_dirs:
          - briefS2_fresh-k2/fresh-k2_r0
          - briefS2_fresh-k2/fresh-k2_r1
          - briefS2_fresh-k2/fresh-k2_r2
        notes: "--sched-stash 2 (VERIFIED in cmd). No scoring JSON."
      - paper_name: "VISTA-Activity, stash 1"
        internal_arm: imp-k2
        stash: 1
        depth: 2
        clip_set: brief
        oracle: brief_x
        metric: event_recall
        n_repeats: 3
        run_dirs:
          - briefD2ctl_imp-k2/imp-k2_r0
          - briefD2ctl_imp-k2/imp-k2_r1
          - briefD2ctl_imp-k2/imp-k2_r2
        notes: "No scoring JSON."
      - paper_name: "VISTA-Activity, stash 2"
        internal_arm: imp-k2
        stash: 2
        depth: 2
        clip_set: brief
        oracle: brief_x
        metric: event_recall
        n_repeats: 3
        run_dirs:
          - briefS2_imp-k2/imp-k2_r0
          - briefS2_imp-k2/imp-k2_r1
          - briefS2_imp-k2/imp-k2_r2
        notes: "The headline row (0.71 @250ms). --sched-stash 2. No scoring JSON."
      - paper_name: "VISTA-Fresh, stash 1"
        internal_arm: fresh-k2
        stash: 1
        depth: 2
        clip_set: persistent
        oracle: pers_x
        metric: event_recall
        n_repeats: 3
        run_dirs:
          - impcmp_fresh-k2_r0/fresh-k2_r0
          - impcmp_fresh-k2_r1/fresh-k2_r0
          - impcmp_fresh-k2_r2/fresh-k2_r0
        notes: "Scored in recall_impcmp.json (the only Table IV rows that are)."
      - paper_name: "VISTA-Fresh, stash 2"
        internal_arm: fresh-k2
        stash: 2
        depth: 2
        clip_set: persistent
        oracle: pers_x
        metric: event_recall
        n_repeats: 3
        run_dirs:
          - persS2_fresh-k2/fresh-k2_r0
          - persS2_fresh-k2/fresh-k2_r1
          - persS2_fresh-k2/fresh-k2_r2
        notes: "No scoring JSON."
      - paper_name: "VISTA-Activity, stash 1"
        internal_arm: imp-k2
        stash: 1
        depth: 2
        clip_set: persistent
        oracle: pers_x
        metric: event_recall
        n_repeats: 3
        run_dirs:
          - impcmp_imp-k2_r0/imp-k2_r0
          - impcmp_imp-k2_r1/imp-k2_r0
