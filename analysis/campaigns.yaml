# ---------------------------------------------------------------------------
# SUPERSEDED SCORING OUTPUTS — do not use, recorded so the hazard survives.
# ---------------------------------------------------------------------------
# Neither file ships (no scoring output does). They are named here because the
# hazard is real for anyone scoring the ORIGINAL archive, and because a
# generator run over that archive can rebuild them: a rescore of e3_m/ will
# faithfully reproduce these wrong numbers from those pre-fix runs. Runs you
# produce with this repository's scheduler are post-fix and unaffected.
superseded:
  - file: recall_m.json
    reason: >-
      Its imp-k2_r{0..4} and salv-k2_r{0..4} rows are PRE-importance-bugfix
      (cov .3853/.3743/.3991/.4002/.3877, age ~92-98 ms). Superseded by
      recall_m2.json, whose imp/salv rows carry the post-fix e8_* data (under
      e3_m labels — see the Table II VISTA-Activity note). It is the only
      record of the pre-fix behaviour and it is where frames_oracle=6415 is
      documented.
  - file: e3_m_aggregate.json
    reason: >-
      Its imp-k2 row aggregates the same pre-fix runs: cov 0.388, age 94.6 ms,
      p99 141.9 ms, yield 0.283 — contradicting the draft's VISTA-Activity row
      (31.7 / 115 / 200 / 23.3) on EVERY cell, by ~7 coverage points. The paper
      correctly does not use it. Its fifo33 / fresh-k2 / fresh-k4 / fifo5 /
      dropold rows are sound and ARE what the draft's p99 column uses for those
      arms. Read those rows if you have the file; never its imp-k2 or salv-k2
      rows.
