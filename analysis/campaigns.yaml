    notes: "nvstreammux's own drop-on-full config. 46.1/856/1006/34.3/0.0 — the stock knob does not remove the queue."

  - paper_name: "(diagnostic) DEC-1/2"
    internal_arm: dec12
    oracle: office_x
    metric: tta_recall
    n_repeats: 3
    run_dirs: [e3_m_decimate_r0/fifo33_r0, e3_m_decimate_r1/fifo33_r0, e3_m_decimate_r2/fifo33_r0]
    notes: >-
      THE TRAP ARM. --gap-every 4 (VERIFIED in all three run_meta.json cmd
      arrays: e3_m_decimate_r{0,1,2}/fifo33_r0). This KEEPS (4-2)/4 = 1/2 of
      frames, which is what "DEC-1/2" names — the keep-fraction, not the flag.
      This registry said "--gap-every 2" until 2026-07-15; that was wrong, and
      wrong in a way the flag's own semantics rule out (gap-every 2 keeps zero
      frames). Mistuned decimation: 997 ms mean age, the
      STALEST configuration measured, ~930 ms worse than Static-Decimation
      (DEC-1/3) despite differing by one integer. This is the evidence for
      "mistuned even slightly it becomes the stalest configuration measured".
      MIXED-n DEFECT (VERIFIED): figures/e3_table_m.tex's DEC-1/2 row is
      43.1/997/1265/31.6, which no single n reproduces. n=2 gives cov .4312
      (43.1 OK) but age 993 (not 997). n=3 gives age 996.95 (997 OK) and p99
      1264.65 (1265 OK) but cov .4301 (43.0, not 43.1). The row mixes n=2
      oracle columns (recall_m_decimate.json scored only r0/r1) with n=3
      age/p99 columns (read straight from the three metrics.csv). Same
      mixed-n mechanism as Table II's Static-Decimation row, but here it
      actually changes a printed digit. Diagnostic only; no paper table cell
      depends on it.

