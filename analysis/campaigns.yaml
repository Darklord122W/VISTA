# campaigns.yaml — paper row -> run dirs -> oracle -> metric -> n.
#
# THE single source of truth for provenance. No script under analysis/ may
# hardcode a run path; every generator resolves rows through this file.
#
# ---------------------------------------------------------------------------
# THE RUNS THIS FILE NAMES ARE NOT IN THIS REPOSITORY
# ---------------------------------------------------------------------------
# The measurement archive is not distributed here: this artifact ships code,
# not runs. Every path below is RELATIVE TO $VISTA_DATA_ROOT and resolves only
# against a directory of campaign run directories that you supply — produce one
# with harness/run_campaign.sh on a Jetson (see harness/README.md). With
# VISTA_DATA_ROOT unset, every script that reads this file exits with one
# message saying so; nothing here silently resolves to nothing.
#
# This file ships anyway, and is worth reading on its own: it is the
# machine-readable map from each of the draft's table rows to the arm
# configuration, flags, oracle, metric and repeat count that produce it, and it
# carries the evidence for every claim it makes — including which of the
# original archive's labels are wrong. It is the specification of the
# experiment, which is reusable; the runs were one execution of it.
#
# Statements below about what the archive "contains", what was "verified", or
# what a row "measures" are findings about the ORIGINAL runs, recorded here so
# the map stays honest. They are not claims about anything in this repository,
# and this repository ships no evidence for them.
#
# ---------------------------------------------------------------------------
# NAMING (read this before touching anything)
# ---------------------------------------------------------------------------
# The directory names on disk are the ORIGINAL experiment names and are
# load-bearing: the archived analysis JSONs key off them. They are mapped to
# the paper's policy names HERE, never by renaming directories.
#
#   PAPER NAME         internal / on-disk
#   Stock-Default      fifo33
#   Stock-LiveDepth    fifo-s2  (label only; the dirs are e7_surfcal_2,
#                                e7_s2_r1, e7_s2_r2 — --replay-surfaces 2)
#   Static-Decimation  dec13 / e3_m_decimate3  (--gap-every 3)
#   VISTA-Fresh        fresh-k2
#   VISTA-Activity     imp-k2
#   (all-admit abl.)   fresh-k4
#
# TRAP: e3_m_decimate  == DEC-1/2, --gap-every 4, mean age 997 ms — the
#       STALEST config measured, a diagnostic only.
#       e3_m_decimate3 == DEC-1/3, --gap-every 3, mean age  64 ms — this is
#       Static-Decimation, a Table II row.
#       Confusing them moves Fig. 3's Static-Decimation point by ~930 ms with
#       no error raised anywhere.
#
# THE "1/2" AND "1/3" LABELS ARE LITERAL KEEP-FRACTIONS, not descriptions of a
# measured effect. --gap-every N drops TWO CONSECUTIVE frames out of every N
# (pipeline_builder.cpp:203-205, `(idx + gap_phase) % gap_every < 2`), so it
# KEEPS exactly (N-2)/N of the frames:
#       --gap-every 4 -> keeps (4-2)/4 = 1/2  -> DEC-1/2  (e3_m_decimate)
#       --gap-every 3 -> keeps (3-2)/3 = 1/3  -> DEC-1/3  (Static-Decimation)
#       --gap-every 44 -> keeps 42/44 = 0.9545 -> the live-rate reference
# The name maps to the keep-fraction, NOT to the flag value. Reading "DEC-1/2"
# as "--gap-every 2" is the exact error this registry carried until 2026-07-15.
# --gap-every 2 is in fact IMPOSSIBLE as a decimation setting: (idx+phase) % 2
# is always < 2, so it would keep (2-2)/2 = ZERO frames and deliver nothing.
#
# Nominal offered load follows the same formula the design docs use
# (docs/design/02-deepstream-pipeline.md §4), 4 cams x (30/0.961) x (N-2)/N:
#       gap-44 -> 119.2 f/s (rho=1.86)   gap-4 -> 62.4 f/s (rho=0.98)
#       gap-3  ->  41.6 f/s (rho=0.65)
# VERIFIED against the archived metrics.csv (arrivals_cum slope, 5 s warmup
# trim): gap-3 measures 41.61 f/s vs 41.62 nominal — an exact match, which is
# what confirms the (N-2)/N mechanism. gap-4 (56.27) and gap-44 (62.64) measure
# BELOW nominal because at those offered loads the replay/decode path is itself
# the bottleneck; that shortfall is a property of the harness, not of the gap
# arithmetic, and it does not affect any published cell.
#
# TRAP: --gap-every is overloaded. 44 = live-rate timing fidelity (every
#       normal run uses it). 3 = the Static-Decimation baseline. 4 = DEC-1/2.
#
# ---------------------------------------------------------------------------
# STASH: every row's TRUE value, and the one place the paper disagrees
# ---------------------------------------------------------------------------
# Every scheduler row below carries explicit `stash:` and `depth:` keys. They
# record what the RUN DID, never what the paper says. Where they disagree, the
# row carries a `stash_note:` saying so. Census done 2026-07-15 over every
# run_meta.json `cmd` and every [sched] banner; the finding is summarised in
# KNOWN-ISSUES.md.
#
# READ THE BANNER, NOT JUST THE FLAGS. The archive spans two binaries:
#   "[sched] mode=imp k=2 depth=2 tau_max=..."         <- PRE-stash build.
#        No stash field. The flag did not exist; a single fresh[c] slot was
#        hardwired == stash 1 (docs/design/04 §6.1). 80 of 107 sched runs.
#   "[sched] mode=imp k=2 depth=2 stash=N tau_max=..."  <- POST-stash build.
#        27 runs. Only these can express stash != 1.
# An ABSENT --sched-stash therefore means stash 1 twice over: it is the
# SchedCfg default AND, on the pre-stash build, the only reachable value.
# Corroboration that the two builds agree at stash 1: e9_depth2 (pre) vs
# e9_depth2_v2 (post, prints stash=1) — same arm, same clips — median mean age
# 112.8 vs 116.3 ms, within run-to-run spread.
#
# TRAP, and the reason this block exists: --sched-stash 2 appears in exactly 13
# runs and ALL of them are on the SKEW clips (briefS2_*, persS2_*,
# _sanity_stash2). ZERO stash-2 runs exist on myclipsForEXP in ANY mode. The
# paper's §IV-A declares VISTA-Activity's config to be "K=2, d=2, and a
# two-frame stash", but the primary-workload VISTA-Activity data (e8_impfix_*,
# = Fig. 3's point, = the old Table II row) is STASH 1 on a pre-stash build.
# Do not "fix" this by editing the stash values below to match the paper —
# the data is what it is; the mismatch is the finding. See KNOWN-ISSUES.md.
#
# ---------------------------------------------------------------------------
# EVIDENCE STATUS of every `notes:` field below
# ---------------------------------------------------------------------------
# Claims marked VERIFIED were re-derived from the archived raw data during
# this artifact's assembly (2026-07-15) by rerunning match_events.py and
# comparing to the archived JSONs / paper cells. Claims marked LEAD are
# plausible reconstructions that were NOT independently confirmed.
# ---------------------------------------------------------------------------

meta:
  paper: "VISTA: Value-Driven Inference Scheduling for Timely Autonomous Multi-Camera Perception"
  data_root_env: VISTA_DATA_ROOT      # required; no default, no run data ships
  # run_meta.json's `git_sha` is NOT a reliable build identifier: the binary
  # that produced these runs exists in no commit (--sched-stash is absent from
  # every commit; 3 files were dirty at run time). run_meta.json's `cmd` array
  # IS reliable — it is the literal argv — and is what the provenance notes
  # below cite. Where a sha is quoted it is used only to show that two run
  # groups came from DIFFERENT builds, not to identify either build.
  platform: "Jetson AGX Orin 64GB, 30W, GPU locked 612 MHz, DeepStream 7.1, FP16 TensorRT"
  workload_replay: "4x 640x480 office clips, --gap-every 44, --skew-ms 0,1134.8,1702.1,567.2"

# ---------------------------------------------------------------------------
# ORACLES / REFERENCES
# ---------------------------------------------------------------------------
oracles:
  office_x:
    run_dir: oracle_x/ref_r0
    detector: yolo11x
    conf: 0.40
    n_events: 123
    notes: >-
      VERIFIED: rebuilding from the archived dets gives 6415 frames, 9715
      detections, 123 events (>=3 frames, IoU-track 0.30) — matches the
      paper's 123. This is the reference for Tables II and III. Its frame
      count (6415) is the coverage DENOMINATOR: frames carrying at least one
      conf>=0.40 oracle detection, not the 6882 frames the cameras produced.
      See README.md, "Coverage denominator".

  brief_x:
    run_dir: charBrief_x/ref_r0
    detector: yolo11x
    conf: 0.40
    n_events: 368
    notes: >-
      Reference for the BRIEF composited skew clip set (~4-frame crossings).
      VERIFIED: recall_brief.json records n_events=368, matching the paper's
      "368 brief".

  pers_x:
    run_dir: charImp_x/ref_r0
    detector: yolo11x
    conf: 0.40
    n_events: 257
    notes: >-
      Reference for the PERSISTENT composited skew clip set (~0.9 s objects).
      VERIFIED: recall_impcmp.json records n_events=257, matching the paper's
      "257 persistent".

  ref_m:
    run_dir: ref_m/ref_r0
    detector: yolo11m
    conf: 0.40
    notes: >-
      SAME-MODEL completeness reference (ring=0, every frame processed). Used
      by clean_events.py to separate scheduling loss from detector capability.
      Not an event oracle. Mean n_in_batch = 3.798, i.e. this reference is a
      batch-4 run, not a batch-1 one. An earlier revision of the paper called
      it a "batch-1 baseline"; that sentence has since been removed, so this
      records what the run is, not an open defect.
  ref_s: {run_dir: ref_s/ref_r0, detector: yolo11s, conf: 0.40}
  ref_l: {run_dir: ref_l/ref_r0, detector: yolo11l, conf: 0.40}

# ---------------------------------------------------------------------------
# TABLE I — detector capacity (implementation.tex, \label{tab:capacity})
# ---------------------------------------------------------------------------
tables:
  table1:
    caption: "Detector capacity on the 612 MHz-locked Orin GPU"
    generator: e1_figures.py
    metric: throughput            # no oracle involved
    oracle: null
    rows:
      - paper_name: YOLO11n
        internal_arm: e1_yolo11n
        run_dirs: [e1_yolo11n]
        n_repeats: 1
        notes: >-
          Deadline sweep, one campaign dir holding push_{5,10,20,33.3,66.7}ms
          .csv + summary.csv. rho=0.84: never saturates, so S(1)=8.8ms and
          S(4)=28.3ms are measured compute directly. This arm's arrivals also
          define the PACED-INPUT baseline used by count_drops.py and
          frame_funnel_fig.py (it is the only model whose transport ring never
          overflows).
      - paper_name: YOLO11s
        internal_arm: e1_yolo11s
        run_dirs: [e1_yolo11s]
        n_repeats: 1
        notes: "rho=1.00, capacity boundary. Saturated => S(4) derived from throughput (4000/capacity), S(1) not measurable."
      - paper_name: YOLO11m
        internal_arm: e1_yolo11m
        run_dirs: [e1_yolo11m]
        n_repeats: 1
        notes: "rho=1.86, the primary operating point of Tables II and IV."
      - paper_name: YOLO11l
        internal_arm: e1_yolo11l
        run_dirs: [e1_yolo11l]
        n_repeats: 1
        notes: "rho=2.33, severe overload."

  # -------------------------------------------------------------------------
  # TABLE II — main policy comparison, YOLO11m, rho=1.86 (tab:policy)
  # -------------------------------------------------------------------------
  # Columns: cov (%) | age (ms) | p99 (ms) | yield (%) | TTA@0.5s (%)
  # Paper cells:
  #   Stock-Default     46.2 | 857 | 1032 | 34.2 |  0.0
  #   Stock-LiveDepth   44.8 | 410 |  601 | 37.6 | 18.7
  #   Static-Decimation 29.9 |  64 |  123 | 21.5 | 30.1
  #   VISTA-Fresh       38.8 |  93 |  139 | 28.6 | 30.1
  #   VISTA-Activity    31.7 | 115 |  200 | 23.3 | 28.5
  #
  # PROVENANCE DEFECT (verified, and the single most important note in this
  # file): Table II's numbers are REAL and come from the CORRECT runs. What is
  # wrong is the LABELLING inside recall_m2.json, the file the table was built
  # from. Two of its `run` strings name directories that either hold different
  # data or do not exist. This is a labelling defect, NOT fabricated data —
  # be precise about that distinction. Both mislabels are resolved below and
  # every cell reproduces from the resolved sources.
  # -------------------------------------------------------------------------
  table2:
    caption: "Main policy comparison at YOLO11m (rho=1.86), medians over repeats"
    generator: make_table2.py
    oracle: office_x
    metric: tta_recall            # EMISSION time. Table IV uses event_recall.
    delta_ms: 500
    columns: [coverage_vs_oracle, e2e_mean, e2e_p99, det_yield_overall, tta_recall@500ms]
    derived_json: recall_m2.json
    notes: >-
      The `age` and `p99` columns come from each run's metrics.csv (post-5s
      warmup trim); the other three come from the oracle scoring JSON. The
      paper's immediate ancestor for this table is figures/e3_table_m.tex,
      which its own header comment says was "reordered" by hand — it is a
      manual composite across four campaigns, not a single generator's output.
      make_table2.py reconstructs it from the resolved sources below.
    rows:
      - paper_name: Stock-Default
        internal_arm: fifo33
        oracle: office_x
        metric: tta_recall
        n_repeats: 5
        run_dirs:
          - e3_m/fifo33_r0
          - e3_m/fifo33_r1
          - e3_m/fifo33_r2
          - e3_m/fifo33_r3
          - e3_m/fifo33_r4
        notes: >-
          VERIFIED: label and directory agree; all five cells reproduce.
          Stock DeepStream, default nvstreammux pool depth, no scheduler.

      - paper_name: Stock-LiveDepth
        internal_arm: fifo-s2
        oracle: office_x
        metric: tta_recall
        n_repeats: 3
        run_dirs:
          - e7_surfcal_2/fifo33_r0
          - e7_s2_r1/fifo33_r0
          - e7_s2_r2/fifo33_r0
        notes: >-
          MISLABEL RESOLVED (VERIFIED). recall_m2.json labels these three rows
          "experiments/results/e3_m/fifo-s2_r{0,1,2}". NO SUCH DIRECTORY HAS
          EVER EXISTED — e3_m contains only fifo33/fifo5/dropold/fresh-k4/
          fresh-k2/imp-k2/salv-k2. Re-scoring the three dirs listed above
          against oracle_x reproduces the archived rows EXACTLY, to four
          decimals, on every metric:
            e7_surfcal_2/fifo33_r0 -> cov .4664 age 389.40 yield .3898 tta .2033
            e7_s2_r1/fifo33_r0     -> cov .4461 age 416.95 yield .3745 tta .1870
            e7_s2_r2/fifo33_r0     -> cov .4485 age 409.66 yield .3764 tta .1870
          Corroborated independently: clean_events.py's "FIFO-s2" arm lists
          exactly these three dirs, and all three run_meta.json cmd arrays
          carry --replay-surfaces 2 (the live-calibrated pool depth) with no
          --sched flag. The label was an alias for the arm, not a path.

      - paper_name: Static-Decimation
        internal_arm: dec13
        oracle: office_x
        metric: tta_recall
        n_repeats: 3
        run_dirs:
          - e3_m_decimate3_r0/fifo33_r0
          - e3_m_decimate3_r1/fifo33_r0
          - e3_m_decimate3_r2/fifo33_r0
        notes: >-
          --gap-every 3 (VERIFIED in all three run_meta.json cmd arrays), which
          KEEPS (3-2)/3 = 1/3 of frames — the "1/3" in the name is the literal
          keep-fraction, not the flag value. This is DEC-1/3, NOT e3_m_decimate
          (DEC-1/2, --gap-every 4, 997 ms).
          n DISCREPANCY (VERIFIED): the archived recall_m_decimate.json scored
          only r0 and r1, and the row is often described as n=2. But the
          paper's p99 cell (123) is the median over THREE repeats
          (121.27/126.00/123.06 -> 123.06 -> "123"); n=2 would give
          (121.27+126.00)/2 = 123.635 -> "124". The paper's row is therefore a
          mixed-n composite: oracle columns at n=2, age/p99 at n=3. This is
          harmless here and we resolve it to a uniform n=3, which reproduces
          all five cells exactly, because this arm is DETERMINISTIC in the
          oracle columns: cov .2987, yield .2151, TTA .3008 are bit-identical
          across r0/r1/r2 (a fixed 1/3 decimation of a deterministic replay
          processes exactly the same frames every time). Only p99 varies.

      - paper_name: VISTA-Fresh
        internal_arm: fresh-k2
        oracle: office_x
        metric: tta_recall
        n_repeats: 5
        stash: 1          # VERIFIED: pre-stash build; stash=1 is also correct
        depth: 2          # for VISTA-Fresh per the paper (w_i=0 -> keep-newest)
        run_dirs:
          - e3_m/fresh-k2_r0
          - e3_m/fresh-k2_r1
          - e3_m/fresh-k2_r2
          - e3_m/fresh-k2_r3
          - e3_m/fresh-k2_r4
        notes: >-
          VERIFIED: label and directory agree; all five cells reproduce.
          Defaults: K=2, d=2, stash=1, w = 0.40/0.35/0.25 with w_i inactive.
          The stash=1 here MATCHES the paper's stated VISTA-Fresh config
          ("a one-frame per-camera stash") — unlike the VISTA-Activity row
          below, this row has no configuration mismatch.

      - paper_name: VISTA-Activity
        internal_arm: imp-k2
        oracle: office_x
        metric: tta_recall
        n_repeats: 3
        run_dirs:
          - e8_impfix_r0/imp-k2_r0
          - e8_impfix_r1/imp-k2_r0
          - e8_impfix_r2/imp-k2_r0
        stash: 1          # VERIFIED — see stash_note below. The paper says 2.
        depth: 2
        stash_note: >-
          CONFIGURATION MISMATCH vs the current draft (VERIFIED 2026-07-15;
          summarised in KNOWN-ISSUES.md). The draft's Sec. IV-A declares
          VISTA-Activity's evaluated configuration to be "K=2, d=2, and a
          two-frame stash". These runs are stash=1. Their cmd tail is exactly
            --sched imp --sched-k 2 --sched-csv <run>/sched.csv --duration 52.0
          — no --sched-depth (default 2), no --sched-stash (default 1; see
          SchedCfg in vista/include/vista/vista_scheduler.hpp).
          Stronger than "defaulted": their [sched] banner emits NO stash field
          at all, i.e. a PRE-stash build that could not express any other
          value. docs/design/04 Sec. 6.1 records the same fact from the other
          side ("v1 hardwired stash = 1 ... no --sched-stash flag to sweep").
          NO stash-2 run exists on myclipsForEXP in ANY mode — the 13 stash-2
          runs are all on the skew clips (briefS2_*, persS2_*, _sanity_stash2).
          So Fig. 3's VISTA-Activity point plots stash-1 data while Sec. IV-A
          declares stash 2. The RQ1 null ("no additional benefit on this
          approximately uniform-activity workload") is consequently confounded:
          docs/design/04 Sec. 3 shows stash 1 caps any camera's share at
          min(stash,d)/(K*d) = 25% regardless of weight, so "uniform workload"
          and "capped by stash 1" are not separable from this data.
          docs/design/04 Sec. 6.2 argues for the uniform-workload reading from
          the office clips' 37/33/28/25 event split — an argument, not a
          measurement. AUTHOR DECISION REQUIRED; do not silently relabel.
        notes: >-
          MISLABEL RESOLVED (VERIFIED). recall_m2.json labels these three rows
          "experiments/results/e3_m/imp-k2_r{0,1,2}". Those directories DO
          exist, but they hold DIFFERENT (pre-importance-bugfix) data. The
          values in recall_m2.json's imp-k2 rows are BYTE-IDENTICAL to
          recall_e78.json's e8_impfix_r{0,1,2}/imp-k2_r0 rows:
            cov .3431 age 109.07 | cov .3166 age 115.47 | cov .3090 age 120.60
          whose median (31.7 / 115 / 23.3 / 28.5) is exactly Table II's row.
          The real e3_m/imp-k2_r{0,1,2} data is cov .3853/.3743/.3991, age
          95.32/97.83/92.18 (see recall_m.json, quarantined) — it contradicts
          Table II on every cell.
          So: Table II's VISTA-Activity NUMBERS ARE THE CORRECT POST-BUGFIX
          ONES. Only the provenance string is wrong. A labelling defect, not
          fabricated data.
          Build evidence (VERIFIED): e3_m/imp-k2_r0 ran 2026-07-08 19:32 under
          recorded sha 7f98270; e8_impfix_r0/imp-k2_r0 ran 21:44 under
          e514f5f. The shas identify no real commit, but their DIFFERENCE plus
          the timeline plus the ~7-point coverage shift is consistent evidence
          of two different builds.

  # -------------------------------------------------------------------------
  # TABLE III — other two load points (tab:policy-sl)
  # -------------------------------------------------------------------------
  # Paper cells:
  #   YOLO11s rho=1.00: Stock 78.6/497/609/62.5/22.8
  #                     VISTA-Fresh 69.3/58/78/55.2/35.8
  #                     VISTA-Activity 68.4/60/89/54.5/35.8
  #   YOLO11l rho=2.33: Stock 33.7/1112/1280/24.6/0.0
  #                     VISTA-Fresh 28.8/121/186/20.7/21.1
  #                     VISTA-Activity 28.7/122/187/20.9/19.5
  # -------------------------------------------------------------------------
  table3:
    caption: "Policy comparison at the other two load points (medians)"
    generator: make_table3.py
    oracle: office_x
    metric: tta_recall
    delta_ms: 500
    derived_json: [recall_s.json, recall_l.json]
    notes: >-
      VERIFIED: unlike Table II this table reproduces cleanly from a single
      generator's output per model — every cell equals the corresponding
      e3_s_aggregate.json / e3_l_aggregate.json entry, which policy_report.py
      produces from these dirs. No mislabels found.
    rows:
      - paper_name: Stock-Default
        internal_arm: fifo33
        load_point: "yolo11s rho=1.00"
        oracle: office_x
        metric: tta_recall
        n_repeats: 3
        run_dirs: [e3_s/fifo33_r0, e3_s/fifo33_r1, e3_s/fifo33_r2]
        notes: >-
          NOTE on the TTA@0.5s cell (22.8): the three repeats are 0.0 / 24.4 /
          22.8 and the median is 22.8. r0's zero is not noise in the policy —
          its mean age (500.54 ms) sits a hair ABOVE the 500 ms deadline while
          r1/r2 (497.34 / 495.09) sit just below, and TTA charges every match
          the run's MEAN age. The metric is discontinuous at age == delta, so
          this arm's TTA@0.5s is a coin flip at rho=1.00. The paper's 22.8 is
          the correct median but the cell is fragile; do not read it as a
          stable estimate. VERIFIED from recall_s.json.
      - paper_name: VISTA-Fresh
        internal_arm: fresh-k2
        load_point: "yolo11s rho=1.00"
        oracle: office_x
        metric: tta_recall
        n_repeats: 3
        stash: 1          # VERIFIED: pre-stash build; matches the paper's
        depth: 2          # stated VISTA-Fresh config (one-frame stash).
        run_dirs: [e3_s/fresh-k2_r0, e3_s/fresh-k2_r1, e3_s/fresh-k2_r2]
        notes: "VERIFIED: all five cells reproduce."
      - paper_name: VISTA-Activity
        internal_arm: imp-k2
        load_point: "yolo11s rho=1.00"
        oracle: office_x
        metric: tta_recall
        n_repeats: 3
        stash: 1          # VERIFIED: pre-stash build. Paper says 2 —
        depth: 2          # same mismatch as table2's row; see PROVENANCE §6.
        run_dirs: [e3_s/imp-k2_r0, e3_s/imp-k2_r1, e3_s/imp-k2_r2]
        notes: >-
          PRE-BUGFIX IMPORTANCE CODE (VERIFIED) — the most consequential
          finding in this file after Table II's mislabels.
          These runs' run_meta.json cmd arrays are the yolo11s twins of
          e3_m/imp-k2, and they ran at 2026-07-08 19:54 under recorded sha
          7f98270 — the SAME build whose YOLO11m output (e3_m/imp-k2) the
          authors superseded with the e8_impfix re-run at 21:44 under sha
          e514f5f (see the `superseded:` block at the end of this file).
          The importance fix was re-run ONLY at YOLO11m. There is no
          e8_impfix-equivalent campaign at s or l anywhere in the archive.
          Consequence: Table II's VISTA-Activity row is post-fix while Table
          III's two VISTA-Activity rows are pre-fix. The two tables therefore
          describe DIFFERENT importance implementations under the same name.
          At YOLO11m the fix moved coverage by ~7 points (38.8 -> 31.7); its
          effect at s/l is UNMEASURED. The rows are recomputable from raw
          dets, but only for the build that produced them — re-running the
          fixed build is out of scope for this artifact.
          The paper does not disclose this. Flagged in the claim->evidence
          matrix; the author decides.
      - paper_name: Stock-Default
        internal_arm: fifo33
