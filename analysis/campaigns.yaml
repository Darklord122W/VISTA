  # -------------------------------------------------------------------------
  # TABLE V — live validation (tab:live)
  # -------------------------------------------------------------------------
  table5:
    caption: "Live validation: 120 s runs on the physical cameras (YOLO11m)"
    generator: live_report.py
    oracle: null                  # no oracle exists for live footage
    metric: throughput_and_age
    n_repeats: 1
    notes: >-
      NO ORACLE AND NO REPEATS. Live footage has no ground truth (an oracle
      pass would need the frames the stock pipeline never received), so this
      table reports only frames-seen / throughput / age / drop visibility.
      Each row is ONE run. The paper's caption says "three 120 s runs"; the
      archive has three live run dirs (fifo33, imp, salv) — i.e. three runs of
      DIFFERENT policies, one each, not three repeats of a policy. The table
      itself shows only two of the three (salv is unreported).
      PRIVACY: the live footage is not shipped (identifiable person). Only
      these derived CSVs are.
    rows:
      - paper_name: Stock-Default
        internal_arm: fifo33
        run_dirs: [e4_live/fifo33]
        n_repeats: 1
        notes: >-
          The "6,433 / ~14,000" cell: 6433 is this run's arrivals_cum; the
          ~14,000 denominator is NOT measured by this run — it is inferred
          from the camera's nominal delivery rate. The run cannot see the
          frames its transport ring dropped upstream of the first probe; that
          blindness is the paper's point (F5), but it also means the
          denominator is an estimate, not an observation.
      - paper_name: VISTA-Activity
        internal_arm: imp-k2
        run_dirs: [e4_live/imp]
        n_repeats: 1
        stash: 1          # VERIFIED from the banner (see stash_note).
        depth: 2
        stash_note: >-
          e4_live has NO run_meta.json, so the cmd
          array is unavailable and the [sched] banner is the only evidence.
          It reads:
            [sched] mode=imp k=2 depth=2 tau_max=150ms tau_salvage=250ms
                    w=(0.40,0.35,0.25) (decision log on)
          depth=2 is stated outright. The stash is inferred, not printed: the
          banner emits NO stash field, which identifies a PRE-stash build (the
          post-stash banner prints "stash=N" — compare briefD2ctl_*), and that
          build hardwired a single fresh[c] slot == stash 1 (docs/design/04
          Sec. 6.1). Confidence: high, but this is a build-identification
          inference rather than a literal argv reading.
          Same paper mismatch as table2's VISTA-Activity row: the live
          "VISTA-Activity" row is stash-1 data while Sec. IV-A declares the
          policy is stash-2. See KNOWN-ISSUES.md.
      - paper_name: "(unreported) VISTA-Salvage"
        internal_arm: salv-k2
        run_dirs: [e4_live/salv]
        n_repeats: 1
        stash: 1          # VERIFIED the same way as the imp row above.
        depth: 2
        notes: >-
          Present in the archive, absent from the paper's table. Shipped for
          completeness; live_report.py prints it.
          Banner: mode=salvage k=2 depth=2, no stash field -> pre-stash build,
          stash 1.

